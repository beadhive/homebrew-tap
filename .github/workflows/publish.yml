# Publishes a bump PR: `brew pr-pull` downloads the PR's test-bot bottle
# artifacts, uploads them to this repo's GitHub Releases, rewrites the
# formula with the `bottle do` block, and pushes the result to main.
#
# Triggered by adding the `pr-pull` label to a PR (auto-label.yml does this
# for bot bump PRs once CI is green; humans can add it manually), or by
# workflow_dispatch with a PR number.
name: brew pr-pull

on:
  pull_request_target:
    types:
      - labeled
  workflow_dispatch:
    inputs:
      pull_request:
        description: Pull request number
        required: true
      head_sha:
        description: Expected pull request head commit SHA (optional)

jobs:
  pr-pull:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'pr-pull'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: write
      issues: read
      pull-requests: write
    steps:
      # Push as the beadhive-automation app: main's ruleset requires signed
      # commits and only that app (Integration) has the signature bypass —
      # the default GITHUB_TOKEN (github-actions[bot]) gets rejected.
      - name: Mint automation app token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c # 2026.07.10.1
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@1f8e202ffddf94def7f42f6fa3a482e821489f9c # 2026.07.10.1

      - name: Pull bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_SHA: ${{ inputs.head_sha }}
          PULL_REQUEST: ${{ inputs.pull_request || github.event.pull_request.number }}
        run: |
          if [[ -n "$HEAD_SHA" ]]
          then
            brew pr-pull --debug --tap="$GITHUB_REPOSITORY" --head-sha="$HEAD_SHA" "$PULL_REQUEST"
          else
            brew pr-pull --debug --tap="$GITHUB_REPOSITORY" "$PULL_REQUEST"
          fi

      - name: Push commits
        uses: Homebrew/actions/git-try-push@1f8e202ffddf94def7f42f6fa3a482e821489f9c # 2026.07.10.1
        with:
          branch: main
          token: ${{ steps.app-token.outputs.token }}
